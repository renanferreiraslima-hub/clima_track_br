<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Previsão do Tempo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>■ Previsão do Tempo</h1>
<div class="search-box">
<input
type="text"
id="cityInput"
placeholder="Digite o nome de uma cidade..."
autocomplete="off"
/>
<button id="searchBtn">Buscar</button>
</div>
<div id="loading" class="loading hidden">
Buscando dados...
</div>
<div id="weatherCard" class="weather-card hidden">
<h2 id="cityName"></h2>
<div class="temp-row">
<span id="weatherIcon" class="weather-icon"></span>
<span id="temperature" class="temperature"></span>
</div>
<p class="weather-desc" id="weatherDesc"></p>
<div class="details">
<div class="detail-item">
<span class="label">Vento</span>
<span id="windSpeed" class="value"></span>
</div>
<div class="detail-item">
<span class="label">Direção</span>
<span id="windDir" class="value"></span>
</div>
<div class="detail-item">
<span class="label">Altitude</span>
<span id="elevation" class="value"></span>
</div>
<div class="detail-item">
<span class="label">Atualizado</span>
<span id="updateTime" class="value"></span>
</div>
</div>
</div>
<div id="errorMsg" class="error hidden"></div>
</div>
<script src="api.js"></script>
</body>
</html>

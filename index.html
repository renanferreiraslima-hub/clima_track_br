<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClimaTrack</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg-mesh">
  <div class="mesh-blob b1"></div>
  <div class="mesh-blob b2"></div>
  <div class="mesh-blob b3"></div>
  <div class="mesh-blob b4"></div>
  <div class="noise"></div>
</div>

<div class="app">

  <header>
    <div class="logo-wrap">
      <div class="logo-icon">
        <i class="fa-solid fa-cloud-bolt"></i>
      </div>
      <div class="logo-text">
        <h1>ClimaTrack</h1>
        <p class="subtitle">Previsão em tempo real</p>
      </div>
    </div>
    <div class="header-badge">
      <span class="pulse-dot"></span> Ao vivo
    </div>
  </header>

  <div class="hero-search">
    <div class="hero-deco">
      <span class="deco-temp">24°</span>
      <span class="deco-emoji e1">⛅</span>
      <span class="deco-emoji e2">🌤️</span>
      <span class="deco-emoji e3">🌧️</span>
      <span class="deco-emoji e4">❄️</span>
    </div>
    <p class="hero-label">Onde você está?</p>
    <div class="search-box">
      <i class="fa-solid fa-location-dot si"></i>
      <input id="cityInput" placeholder="Digite uma cidade...">
      <button id="searchBtn"><i class="fa-solid fa-arrow-right"></i></button>
    </div>
    <div class="quick-cities">
      <span class="qc-label">Sugestões:</span>
      <button class="qc-btn" data-city="São Paulo">São Paulo</button>
      <button class="qc-btn" data-city="Rio de Janeiro">Rio de Janeiro</button>
      <button class="qc-btn" data-city="Curitiba">Curitiba</button>
    </div>
  </div>

  <div id="loading" class="loading hidden">
    <div class="loading-inner">
      <div class="loader-ring"></div>
      <span>Localizando clima...</span>
    </div>
  </div>

  <div id="errorMsg" class="error hidden"></div>

  <div id="currentWeather" class="current-card hidden"></div>

  <div id="extraRow" class="extra-row hidden"></div>

  <div id="forecastWrap" class="forecast-section hidden">
    <div class="section-header">
      <span class="section-label">Próximos dias</span>
      <span class="section-sub">previsão de 6 dias</span>
    </div>
    <div id="forecast" class="forecast-grid"></div>
  </div>

  <div id="sunWrap" class="sun-row hidden"></div>

  <footer class="footer-note">
    <i class="fa-solid fa-satellite-dish"></i>
    Dados: Open-Meteo · código aberto e gratuito
  </footer>

</div>

<script src="api.js"></script>
</body>
</html>
